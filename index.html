<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0f12 0%, #1a1a24 100%);
            --panel-bg: rgba(30, 30, 42, 0.65);
            --border-color: rgba(212, 175, 55, 0.2);
            --gold-primary: #d4af37;
            --gold-glow: #f3e5ab;
            --text-main: #f5f5f7;
            --text-muted: #a0a0b0;
        }

        /* تصفير الإعدادات وحل مشكلة الإطارات الزرقاء تماماً */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
            outline: none !important;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* حاوية التطبيق الرئيسية */
        .app-container {
            width: 100%;
            max-width: 480 bounds;
            height: 100vh;
            background: rgba(15, 15, 18, 0.8);
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: relative;
        }

        /* الشريط العلوي الاحترافي (Header) */
        .app-header {
            padding: 20px;
            background: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .brand-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-logo {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--gold-primary);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
            object-fit: cover;
        }

        .brand-name {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(90deg, #fff, var(--gold-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 15px;
            color: var(--gold-primary);
            font-size: 18px;
        }

        .header-actions i {
            cursor: pointer;
            transition: transform 0.2s;
        }

        .header-actions i:active {
            transform: scale(0.9);
        }

        /* منطقة الرسائل والمحادثة */
        .chat-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        /* تصميم فقاعات الرسائل زجاجي انسيابي */
        .message {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.6;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.25) 0%, rgba(184, 134, 11, 0.15) 100%);
            border: 1px solid rgba(212, 175, 55, 0.3);
            align-self: flex-start;
            border-top-right-radius: 4px;
            color: #fff;
        }

        .message.ai {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            align-self: flex-end;
            border-top-left-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* صندوق الإدخال السفلي الفخم */
        .input-area {
            padding: 20px;
            background: var(--panel-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: rgba(20, 20, 28, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 6px 14px;
            transition: border-color 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: var(--gold-primary);
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.2);
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 15px;
            padding: 10px;
        }

        .chat-input::placeholder {
            color: var(--text-muted);
        }

        .action-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 18px;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover {
            color: var(--gold-primary);
        }

        .send-btn {
            background: var(--gold-primary);
            color: #101014;
        }

        .send-btn:hover {
            background: var(--gold-glow);
            color: #101014;
            transform: scale(1.05);
        }

        /* شريط سفلي للأزرار السريعة (تحليل، ميزات، إعدادات) */
        .quick-features {
            display: flex;
            justify-content: space-around;
            font-size: 12px;
            color: var(--text-muted);
        }

        .feature-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .feature-item i {
            font-size: 16px;
            color: var(--gold-primary);
        }

        /* إخفاء شريط التمرير الافتراضي المزعج */
        .chat-area::-webkit-scrollbar {
            width: 4px;
        }
        .chat-area::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <div class="brand-info">
                <img src="https://ahmadkorai254-glitch.github.io/-/876.png" class="brand-logo" alt="Logo">
                <span class="brand-name">Luxury AI</span>
            </div>
            <div class="header-actions">
                <i class="fas fa-palette" title="سمة التطبيق"></i>
                <i class="fas fa-cog" title="الإعدادات"></i>
            </div>
        </header>

        <main class="chat-area" id="chatArea">
            <div class="message ai">
                مرحباً بك يا أحمد في <b>Luxury AI</b> الملكي ✨. كيف يمكنني مساعدتك اليوم؟ يمكنك تجربة كتابة رسالة أو اختبار الميزات الفاخرة بالأسفل.
            </div>
        </main>

        <footer class="input-area">
            <div class="input-wrapper">
                <button class="action-btn" title="رفع صورة"><i class="fas fa-image"></i></button>
                <button class="action-btn" title="تسجيل صوتي"><i class="fas fa-microphone"></i></button>
                
                <input type="text" class="chat-input" id="userInput" placeholder="اكتب رسالتك الذكية هنا...">
                
                <button class="action-btn send-btn" id="sendBtn"><i class="fas fa-paper-plane-vertical"></i></button>
            </div>
            
            <div class="quick-features">
                <div class="feature-item"><i class="fas fa-user-shield"></i><span>تسجيل الدخول</span></div>
                <div class="feature-item"><i class="fas fa-wand-magic-sparkles"></i><span>تحليل الصور</span></div>
                <div class="feature-item"><i class="fas fa-volume-high"></i><span>صوت نقي</span></div>
            </div>
        </footer>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        function sendMessage() {
            const text = userInput.value.trim();
            if (text === '') return;

            // رسالة المستخدم
            const userDiv = document.createElement('div');
            userDiv.className = 'message user';
            userDiv.textContent = text;
            chatArea.appendChild(userDiv);
            
            userInput.value = '';
            chatArea.scrollTop = chatArea.scrollHeight;

            // محاكاة استجابة الذكاء الاصطناعي الأنيقة
            setTimeout(() => {
                const aiDiv = document.createElement('div');
                aiDiv.className = 'message ai';
                aiDiv.innerHTML = `تم استلام أمرك الفاخر: <b>"${text}"</b>. جاري معالجة طلبك عبر الخوادم الذكية...`;
                chatArea.appendChild(aiDiv);
                chatArea.scrollTop = chatArea.scrollHeight;
            }, 800);
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
