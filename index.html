<script>
    let currentModel = 'gemini';

    function toggleSendBtn() {
        const input = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        if (input.value.trim().length > 0) {
            sendBtn.classList.add('active');
        } else {
            sendBtn.classList.remove('active');
        }
    }

    function switchModel(model) {
        currentModel = model;
        document.querySelectorAll('.model-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.model-btn[data-model="${model}"]`).classList.add('active');
    }

    function useSuggestion(text) {
        document.getElementById('chatInput').value = text;
        toggleSendBtn();
        sendMessage();
    }

    function resetToHome() {
        const chatArea = document.getElementById('chatArea');
        chatArea.innerHTML = `
            <div class="welcome-container" id="welcomeSection">
                <div class="welcome-avatar"></div>
                <h2 class="welcome-text">مرحباً بك في ahmad AI</h2>
                <p class="welcome-subtext">اسأل أي شيء – نصوص، برمجة، أو ارفع صورة لتحليلها</p>
                <div class="suggestions-grid">
                    <div class="suggestion-card" onclick="useSuggestion('اكتب كود دالة لفحص رقم أولي بـ Python')"><span class="card-icon">&lt;/&gt;</span><h4 class="card-title">اكتب كود</h4><p class="card-desc">دالة لفحص رقم أولي بـ Python</p></div>
                    <div class="suggestion-card orange" onclick="useSuggestion('حلل هذه الصورة واشرح محتواها')"><span class="card-icon">📷</span><h4 class="card-title">حلل صورة</h4><p class="card-desc">ارفع صورة واسأل عنها</p></div>
                    <div class="suggestion-card orange" onclick="useSuggestion('ما الفرق بين REST و GraphQL؟')"><span class="card-icon">💡</span><h4 class="card-title">اشرح فكرة</h4><p class="card-desc">ما الفرق بين REST و GraphQL؟</p></div>
                    <div class="suggestion-card" onclick="useSuggestion('ترجم هذه الفقرة من العربية إلى الإنجليزية')"><span class="card-icon">文</span><h4 class="card-title">ترجم نص</h4><p class="card-desc">ترجم فقرة من العربية إلى الإنجليزية</p></div>
                </div>
            </div>`;
    }

    // الدالة المحدثة كلياً لتدعم البث السريع (Streaming)
    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const text = input.value.trim();
        if (!text) return;

        const chatArea = document.getElementById('chatArea');
        
        const welcomeSection = document.getElementById('welcomeSection');
        if (welcomeSection) welcomeSection.remove();

        const userMsg = document.createElement('div');
        userMsg.className = 'message user';
        userMsg.innerText = text;
        chatArea.appendChild(userMsg);

        input.value = '';
        sendBtn.classList.remove('active');
        chatArea.scrollTop = chatArea.scrollHeight;

        // إنشاء مكان الإجابة فوراً تمهيداً لتدفق الكلمات
        const aiMsg = document.createElement('div');
        aiMsg.className = 'message ai';
        aiMsg.innerText = "🔍 جاري الاتصال بالذكاء الاصطناعي...";
        chatArea.appendChild(aiMsg);
        chatArea.scrollTop = chatArea.scrollHeight;

        try {
            const apiModel = currentModel === 'gemini' ? 'gemini' : 'openai';
            // إضافة سهم التوجيه والستريم للرابط
            const response = await fetch(`https://text.pollinations.ai/${encodeURIComponent(text)}?model=${apiModel}&stream=true&cache=false`);
            
            if (!response.ok) {
                aiMsg.innerText = "النموذج ممتلئ بالطلبات حالياً، يرجى المحاولة مرة أخرى.";
                return;
            }

            // قراءة دفق البيانات (Stream Reader) لتحديث النص كلمة بكلمة
            const reader = response.body.getReader();
            const decoder = new TextDecoder("utf-8");
            aiMsg.innerText = ""; // تصفير النص البدائي لبدء الكتابة الحية

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                // فك تشفير الكلمات الممررة وإضافتها فوراً للواجهة
                const chunk = decoder.decode(value, { stream: true });
                aiMsg.innerText += chunk;
                chatArea.scrollTop = chatArea.scrollHeight;
            }

        } catch (error) {
            aiMsg.innerText = "عذراً، واجهت مشكلة في الاتصال بالشبكة. يرجى المحاولة مجدداً.";
        } finally {
            chatArea.scrollTop = chatArea.scrollHeight;
        }
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }
</script>
