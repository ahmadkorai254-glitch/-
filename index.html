<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury AI - Dual Models</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --chat-bg: #ffffff;
            --text-color: #1e293b;
            --gpt-color: #10a37f;
            --claude-color: #d97706;
            --user-msg-bg: #2563eb;
            --ai-msg-bg: #f1f5f9;
            --border-color: #e2e8f0;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-gradient: linear-gradient(135deg, #0f172a 0%, #020617 100%);
                --chat-bg: #1e293b;
                --text-color: #f8fafc;
                --ai-msg-bg: #334155;
                --border-color: #334155;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
        body { background: var(--bg-gradient); height: 100vh; display: flex; justify-content: center; align-items: center; padding: 10px; }
        
        .app-container {
            width: 100%;
            max-width: 500px;
            height: 92vh;
            background: var(--chat-bg);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* شريط اختيار النموذج النشط */
        .model-selector {
            display: flex;
            background: var(--ai-msg-bg);
            padding: 6px;
            gap: 6px;
            border-bottom: 1px solid var(--border-color);
        }

        .model-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            color: var(--text-color);
            opacity: 0.6;
        }

        .model-tab.active[data-model="chatgpt"] {
            background: var(--gpt-color);
            color: white;
            opacity: 1;
        }

        .model-tab.active[data-model="claude"] {
            background: var(--claude-color);
            color: white;
            opacity: 1;
        }

        .messages-area { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        
        .message { max-width: 80%; padding: 12px 16px; border-radius: 16px; font-size: 0.95rem; line-height: 1.4; animation: fadeIn 0.25s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .message.user { background: var(--user-msg-bg); color: white; align-self: flex-start; border-bottom-right-radius: 4px; }
        
        /* تمييز ردود الذكاء الاصطناعي بناءً على الهوية */
        .message.ai { background: var(--ai-msg-bg); color: var(--text-color); align-self: flex-end; border-bottom-left-radius: 4px; position: relative; }
        .message.ai::before { content: attr(data-sender); display: block; font-size: 0.75rem; font-weight: bold; margin-bottom: 4px; opacity: 0.7; }
        .message.ai.gpt::before { color: var(--gpt-color); }
        .message.ai.claude::before { color: var(--claude-color); }

        .input-area { padding: 12px; background: var(--chat-bg); border-top: 1px solid var(--border-color); display: flex; gap: 8px; }
        .chat-input { flex: 1; padding: 12px 16px; background: var(--ai-msg-bg); border: 1px solid var(--border-color); border-radius: 20px; color: var(--text-color); font-size: 0.95rem; outline: none; }
        
        .send-btn { background: var(--user-msg-bg); color: white; border: none; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; font-size: 1.1rem; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="model-selector">
            <div class="model-tab active" data-model="chatgpt" onclick="switchModel('chatgpt')">ChatGPT (GPT-4o)</div>
            <div class="model-tab" data-model="claude" onclick="switchModel('claude')">Claude (Anthropic)</div>
        </div>

        <div class="messages-area" id="messagesArea">
            <div class="message ai gpt" data-sender="ChatGPT">مرحباً أحمد! أنا نموذج ChatGPT المطور من OpenAI، كيف يمكنني مساعدتك برمجياً الآن؟</div>
        </div>

        <div class="input-area">
            <input type="text" class="chat-input" id="chatInput" placeholder="اكتب سؤالك التقني هنا..." onkeypress="checkEnter(event)">
            <button class="send-btn" onclick="handleSend()">➔</button>
        </div>
    </div>

    <script>
        let currentModel = 'chatgpt';
        const messagesArea = document.getElementById('messagesArea');
        const chatInput = document.getElementById('chatInput');

        // تبديل النموذج الفعال برمجياً وفصل الهويات
        function switchModel(modelName) {
            currentModel = modelName;
            document.querySelectorAll('.model-tab').forEach(tab => tab.classList.remove('active'));
            document.querySelector(`.model-tab[data-model="${modelName}"]`).classList.add('active');
            
            // إضافة رسالة ترحيبية تؤكد الهوية المنفصلة
            if(modelName === 'claude') {
                appendSystemMessage("تم التحويل إلى نموذج Claude 3.5 الصادر من Anthropic بنجاح.", "claude");
            } else {
                appendSystemMessage("تم التحويل إلى نموذج ChatGPT الصادر من OpenAI بنجاح.", "gpt");
            }
        }

        function checkEnter(e) { if (e.key === 'Enter') handleSend(); }

        function handleSend() {
            const text = chatInput.value.trim();
            if (!text) return;

            // 1. عرض رسالة المستخدم
            appendMessage(text, 'user');
            chatInput.value = '';

            // 2. معالجة الرد المنفصل بناءً على النموذج المختار لإنهاء مشكلة التطابق والتقليد
            setTimeout(() => {
                generateSeparateResponse(text, currentModel);
            }, 700);
        }

        function appendMessage(text, sender, modelClass = '', senderName = '') {
            const div = document.createElement('div');
            div.className = `message ${sender} ${modelClass}`;
            if(sender === 'ai') {
                div.setAttribute('data-sender', senderName);
            }
            div.innerText = text;
            messagesArea.appendChild(div);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function appendSystemMessage(text, style) {
            const div = document.createElement('div');
            div.style.alignSelf = 'center';
            div.style.fontSize = '0.8rem';
            div.style.background = 'rgba(0,0,0,0.05)';
            div.style.padding = '4px 12px';
            div.style.borderRadius = '12px';
            div.style.color = 'var(--text-color)';
            div.style.opacity = '0.7';
            div.innerText = text;
            messagesArea.appendChild(div);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        // دالة فصل الهويات الحقيقية ومنع التداخل
        function generateSeparateResponse(promptText, model) {
            let responseText = "";
            let senderName = "";
            let modelClass = "";

            if (model === 'chatgpt') {
                senderName = "ChatGPT (OpenAI)";
                modelClass = "gpt";
                // هنا تضع رابط الـ API الفعلي الخاص بـ OpenAI
                responseText = `أنا نموذج ChatGPT المطور بواسطة OpenAI. لقد استقبلت سؤالك بخصوص: "${promptText}". كيف يمكنني صياغة الكود لك؟`;
            } else if (model === 'claude') {
                senderName = "Claude (Anthropic)";
                modelClass = "claude";
                // هنا تضع رابط الـ API الفعلي الخاص بـ Anthropic لمنع أي تداخل
                responseText = `أنا Claude، النموذج الذكي المطور من قبل شركة Anthropic. يسعدني تقديم تحليل دقيق ومختلف تماماً عن محركات الذكاء الاصطناعي الأخرى لسؤالك: "${promptText}".`;
            }

            appendMessage(responseText, 'ai', modelClass, senderName);
        }
    </script>
</body>
    </html>
