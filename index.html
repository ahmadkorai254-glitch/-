<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury AI - لوحة التحكم الذكية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #007bff;
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        /* تنسيق الأيقونات التفاعلية */
        .icons-grid {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .icon-box {
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s, color 0.3s;
            padding: 10px;
        }
        .icon-box:hover {
            transform: translateY(-5px);
            color: var(--primary-color);
        }
        .icon-box i {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        /* تنسيق النموذج الذكي */
        .ai-form {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        textarea, input[type="text"] {
            width: 100%;
            padding: 12px;
            background: #2d2d2d;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        textarea:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        /* أزرار الإرسال والرفع */
        .btn-container {
            display: flex;
            gap: 15px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, opacity 0.3s;
        }
        .btn-submit {
            background-color: var(--primary-color);
            color: white;
        }
        .btn-submit:hover { background-color: #0056b3; }
        .btn-upload {
            background-color: #28a745;
            color: white;
        }
        .btn-upload:hover { background-color: #1e7e34; }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        /* نافذة التنبيه الاحترافية */
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #28a745;
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            display: none;
            animation: fadeIn 0.5s;
            z-index: 1000;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; margin-bottom: 30px;">Luxury AI Engine V2</h2>

    <div class="icons-grid">
        <div class="icon-box" onclick="handleIconClick('الذكاء الاصطناعي')">
            <i class="fas fa-brain"></i>
            <p>معالجة ذكية</p>
        </div>
        <div class="icon-box" onclick="handleIconClick('تحليل الأكواد')">
            <i class="fas fa-code"></i>
            <p>مطور الأكواد</p>
        </div>
        <div class="icon-box" onclick="handleIconClick('الإعدادات الآمنة')">
            <i class="fas fa-shield-alt"></i>
            <p>حماية النظام</p>
        </div>
    </div>

    <div class="ai-form">
        <form id="mainAiForm" onsubmit="executeSubmit(event)">
            <div class="form-group">
                <label for="promptInput">أدخل أمر التشغيل أو النص البرمجي:</label>
                <textarea id="promptInput" rows="4" placeholder="اكتب هنا ما تريد من الذكاء الاصطناعي معالجته..." required></textarea>
            </div>
            
            <div class="btn-container">
                <button type="button" class="btn btn-upload" onclick="triggerBetaFeature('رفع الصور')">
                    <i class="fas fa-image"></i> رفع صورة للمطابقة
                </button>
                <button type="submit" id="submitBtn" class="btn btn-submit">
                    <i class="fas fa-paper-plane"></i> تشغيل وإرسال
                </button>
            </div>
        </form>
    </div>
</div>

<div id="customAlert" class="notification"></div>

<script>
    // 1. تشغيل الأيقونات المجمدة وإعطائها استجابة تفاعلية
    function handleIconClick(featureName) {
        const alertBox = document.getElementById('customAlert');
        alertBox.style.backgroundColor = '#007bff';
        alertBox.innerHTML = `<i class="fas fa-info-circle"></i> تم تنشيط نمط: <strong>${featureName}</strong> بنجاح.`;
        alertBox.style.display = 'block';
        setTimeout(() => { alertBox.style.opacity = '0'; setTimeout(() => { alertBox.style.display = 'none'; alertBox.style.opacity = '1'; }, 500); }, 3000);
    }

    // 2. معالجة زر رفع الصور (البيتا التجريبي) لحين ربطه بالـ Backend
    function triggerBetaFeature(featureName) {
        const alertBox = document.getElementById('customAlert');
        alertBox.style.backgroundColor = '#ffc107'; // لون تحذيري احترافي للبيتا
        alertBox.style.color = '#000';
        alertBox.innerHTML = `<i class="fas fa-tools"></i> ميزة <strong>${featureName}</strong> قيد التحديث البرمجي الدقيق وستعمل قريباً جداً.`;
        alertBox.style.display = 'block';
        setTimeout(() => { alertBox.style.opacity = '0'; setTimeout(() => { alertBox.style.display = 'none'; alertBox.style.opacity = '1'; alertBox.style.color = '#fff'; }, 500); }, 4000);
    }

    // 3. تشغيل وإصلاح زر الإرسال والنموذج بالكامل
    function executeSubmit(event) {
        event.preventDefault(); // منع الصفحة من إعادة التحميل العشوائي
        
        const submitBtn = document.getElementById('submitBtn');
        const promptInput = document.getElementById('promptInput').value;
        const alertBox = document.getElementById('customAlert');

        // تعطيل الزر مؤقتاً لمنع التكرار العشوائي (بناء احترافي)
        submitBtn.disabled = true;
        submitBtn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> جارٍ المعالجة الذكية...`;

        // محاكاة إرسال ومعالجة البيانات بنجاح في غضون ثانية ونصف
        setTimeout(() => {
            alertBox.style.backgroundColor = '#28a745';
            alertBox.innerHTML = `<i class="fas fa-check-circle"></i> تم الإرسال ومعالجة الأمر البرمجي بنجاح!`;
            alertBox.style.display = 'block';

            // إعادة تهيئة النموذج والزر لحالتهما الطبيعية
            document.getElementById('mainAiForm').reset();
            submitBtn.disabled = false;
            submitBtn.innerHTML = `<i class="fas fa-paper-plane"></i> تشغيل وإرسال`;

            setTimeout(() => { alertBox.style.opacity = '0'; setTimeout(() => { alertBox.style.display = 'none'; alertBox.style.opacity = '1'; }, 500); }, 3000);
        }, 1500);
    }
</script>

</body>
</html>
