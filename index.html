<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ahmad AI</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(180deg, #111111 0%, #070707 100%);
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #a0aec0;
            --border-color: #2d3748;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing: antialiased; }
        body { background: var(--bg-gradient); color: var(--text-main); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 10px; }
        .app-container { width: 100%; max-width: 430px; height: 880px; max-height: 95vh; background: #151515; border-radius: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); border: 1px solid var(--border-color); display: flex; flex-direction: column; overflow: hidden; }
        .app-header { padding: 20px; display: flex; flex-direction: column; align-items: center; border-bottom: 1px solid var(--border-color); background: rgba(21,21,21,0.8); backdrop-filter: blur(10px); z-index: 10; }
        .header-top { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .menu-btn, .new-chat-btn { background: transparent; border: none; cursor: pointer; color: var(--text-main); padding: 5px; }
        .app-title { font-size: 1.3rem; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 6px; }
        .status-dot { width: 8px; height: 8px; background-color: #22c55e; border-radius: 50%; display: inline-block; }
        .model-selector { display: flex; background: #222; padding: 4px; border-radius: 20px; gap: 5px; width: 220px; }
        .model-btn { flex: 1; padding: 8px 16px; border: none; background: transparent; color: var(--text-muted); font-size: 0.85rem; font-weight: 600; cursor: pointer; border-radius: 16px; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .model-btn.active[data-model="gemini"] { background: #2d3748; color: #63b3ed; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        .model-btn.active[data-model="claude"] { background: #2d3748; color: #f6ad55; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        .model-dot { width: 6px; height: 6px; border-radius: 50%; }
        .gemini-dot { background-color: #63b3ed; }
        .claude-dot { background-color: #f6ad55; }
        .chat-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; background: #0f0f0f; }
        .welcome-container { display: flex; flex-direction: column; align-items: center; text-align: center; margin-top: 20px; }
        .welcome-avatar { width: 90px; height: 90px; border-radius: 50%; background: linear-gradient(135deg, #2c5282 0%, #1a202c 100%); margin-bottom: 15px; box-shadow: 0 10px 25px rgba(44,82,130,0.4); }
        .welcome-text { font-size: 1.4rem; font-weight: 700; color: #fff; margin-bottom: 6px; }
        .welcome-subtext { font-size: 0.95rem; color: var(--text-muted); margin-bottom: 30px; }
        .suggestions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 380px; }
        .suggestion-card { background: #1e1e1e; border: 1px solid var(--border-color); border-radius: 20px; padding: 16px; text-align: right; cursor: pointer; transition: all 0.2s ease; display: flex; flex-direction: column; gap: 8px; }
        .suggestion-card:hover { transform: translateY(-2px); border-color: #4a5568; }
        .card-icon { font-size: 1.2rem; color: #63b3ed; }
        .suggestion-card.orange .card-icon { color: #f6ad55; }
        .card-title { font-size: 0.95rem; font-weight: 600; color: #fff; }
        .card-desc { font-size: 0.8rem; color: var(--text-muted); line-height: 1.3; }
        .message { max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 0.95rem; line-height: 1.5; margin-bottom: 12px; white-space: pre-wrap; word-break: break-word; animation: scaleUp 0.25s ease; }
        @keyframes scaleUp { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .message.user { background: #2d3748; color: #fff; align-self: flex-start; border-bottom-right-radius: 4px; }
        .message.ai { background: #1e1e1e; color: #fff; align-self: flex-end; border-bottom-left-radius: 4px; border: 1px solid var(--border-color); }
        .input-container { padding: 15px 20px 25px; background: #151515; border-top: 1px solid var(--border-color); }
        .input-wrapper { background: #222; border: 1px solid var(--border-color); border-radius: 28px; padding: 6px 12px; display: flex; align-items: center; gap: 10px; }
        .action-icon { background: transparent; border: none; cursor: pointer; color: var(--text-muted); display: flex; align-items: center; padding: 4px; transition: color 0.2s; }
        .action-icon:hover { color: #fff; }
        .chat-input { flex: 1; padding: 10px 4px; background: transparent; border: none; color: #fff; font-size: 0.95rem; outline: none; }
        .chat-input::placeholder { color: #718096; }
        .send-btn { background: #4a5568; border: none; width: 36px; height: 36px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: all 0.2s ease; }
        .send-btn.active { background: #fff; }
        .send-btn.active svg { fill: #000; }
        .send-btn svg { width: 16px; height: 16px; fill: #fff; transform: rotate(180deg); }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <div class="header-top">
                <button class="menu-btn" onclick="alert('لوحة التحكم قيد التحديث!')">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <div class="app-title">ahmad AI <span class="status-dot"></span></div>
                <button class="new-chat-btn" onclick="resetToHome()">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4Z"></path></svg>
                </button>
            </div>
            <div class="model-selector">
                <button class="model-btn" data-model="claude" onclick="switchModel('claude')">
                    <span class="model-dot claude-dot"></span> Claude
                </button>
                <button class="model-btn active" data-model="gemini" onclick="switchModel('gemini')">
                    <span class="model-dot gemini-dot"></span> Gemini
                </button>
            </div>
        </div>
        <div class="chat-area" id="chatArea">
            <div class="welcome-container" id="welcomeSection">
                <div class="welcome-avatar"></div>
                <h2 class="welcome-text">مرحباً بك في ahmad AI</h2>
                <p class="welcome-subtext">اسأل أي شيء – نصوص، برمجة، أو ارفع صورة لتحليلها</p>
                <div class="suggestions-grid">
                    <div class="suggestion-card" onclick="useSuggestion('اكتب كود دالة لفحص رقم أولي بـ Python')"><span class="card-icon">&lt;/&gt;</span><h4 class="card-title">اكتب كود</h4><p class="card-desc">دالة لفحص رقم أولي بـ Python</p></div>
                    <div class="suggestion-card orange" onclick="useSuggestion('حلل هذه الصورة واشرح محتواها')"><span class="card-icon">📷</span><h4 class="card-title">حلل صورة</h4><p class="card-desc">ارفع صورة واسأل عنها</p></div>
                    <div class="suggestion-card orange" onclick="useSuggestion('ما الفرق بين REST و GraphQL؟')"><span class="card-icon">💡</span><h4 class="card-title">اشرح فكرة</h4><p class="card-desc">ما الفرق بين REST و GraphQL?</p></div>
                    <div class="suggestion-card" onclick="useSuggestion('ترجم هذه الفقرة من العربية إلى الإنجليزية')"><span class="card-icon">文</span><h4 class="card-title">ترجم نص</h4><p class="card-desc">ترجم فقرة من العربية إلى الإنجليزية</p></div>
                </div>
            </div>
        </div>
        <div class="input-container">
            <div class="input-wrapper">
                <button class="action-icon" onclick="alert('ميزة رفع الصور ستتوفر قريباً!')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                </button>
                <button class="action-icon" onclick="alert('ميزة الكاميرا ستتوفر قريباً!')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                </button>
                <input type="text" class="chat-input" id="chatInput" placeholder="...اكتب رسالتك" oninput="toggleSendBtn()" onkeypress="handleKeyPress(event)">
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </div>
    <script>
        let currentModel = 'gemini';

        function toggleSendBtn() {
            const input = document.getElementById('chatInput');
            document.getElementById('sendBtn').classList.toggle('active', input.value.trim().length > 0);
        }

        function switchModel(model) {
            currentModel = model;
            document.querySelectorAll('.model-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.model-btn[data-model="${model}"]`).classList.add('active');
        }

        function useSuggestion(text) {
            document.getElementById('chatInput').value = text;
            toggleSendBtn();
            sendMessage();
        }

        function resetToHome() {
            document.getElementById('chatArea').innerHTML = `
                <div class="welcome-container" id="welcomeSection">
                    <div class="welcome-avatar"></div>
                    <h2 class="welcome-text">مرحباً بك في ahmad AI</h2>
                    <p class="welcome-subtext">اسأل أي شيء – نصوص، برمجة، أو ارفع صورة لتحليلها</p>
                    <div class="suggestions-grid">
                        <div class="suggestion-card" onclick="useSuggestion('اكتب كود دالة لفحص رقم أولي بـ Python')"><span class="card-icon">&lt;/&gt;</span><h4 class="card-title">اكتب كود</h4><p class="card-desc">دالة لفحص رقم أولي بـ Python</p></div>
                        <div class="suggestion-card orange" onclick="useSuggestion('حلل هذه الصورة واشرح محتواها')"><span class="card-icon">📷</span><h4 class="card-title">حلل صورة</h4><p class="card-desc">ارفع صورة واسأل عنها</p></div>
                        <div class="suggestion-card orange" onclick="useSuggestion('ما الفرق بين REST و GraphQL؟')"><span class="card-icon">💡</span><h4 class="card-title">اشرح فكرة</h4><p class="card-desc">ما الفرق بين REST و GraphQL؟</p></div>
                        <div class="suggestion-card" onclick="useSuggestion('ترجم هذه الفقرة من العربية إلى الإنجليزية')"><span class="card-icon">文</span><h4 class="card-title">ترجم نص</h4><p class="card-desc">ترجم فقرة من العربية إلى الإنجليزية</p></div>
                    </div>
                </div>`;
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const sendBtn = document.getElementById('sendBtn');
            const text = input.value.trim();
            if (!text) return;

            const chatArea = document.getElementById('chatArea');
            const welcomeSection = document.getElementById('welcomeSection');
            if (welcomeSection) welcomeSection.remove();

            const userMsg = document.createElement('div');
            userMsg.className = 'message user';
            userMsg.innerText = text;
            chatArea.appendChild(userMsg);

            input.value = '';
            sendBtn.classList.remove('active');
            chatArea.scrollTop = chatArea.scrollHeight;

            const aiMsg = document.createElement('div');
            aiMsg.className = 'message ai';
            aiMsg.innerText = '...';
            chatArea.appendChild(aiMsg);
            chatArea.scrollTop = chatArea.scrollHeight;

            try {
                const modelMap = { 'gemini': 'gemini', 'claude': 'openai-large' };
                const apiModel = modelMap[currentModel] || 'openai';

                const response = await fetch(
                    `https://text.pollinations.ai/${encodeURIComponent(text)}?model=${apiModel}&cache=false`,
                    { signal: AbortSignal.timeout(20000) }
                );

                if (!response.ok) throw new Error('fail');

                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                aiMsg.innerText = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    aiMsg.innerText += decoder.decode(value, { stream: true });
                    chatArea.scrollTop = chatArea.scrollHeight;
                }

                if (!aiMsg.innerText.trim()) aiMsg.innerText = 'لم يصل رد. حاول مجدداً.';

            } catch (error) {
                aiMsg.innerText = 'تعذر الاتصال. حاول مجدداً.';
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') sendMessage();
        }
    </script>
</body>
</html>
