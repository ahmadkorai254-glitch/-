<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmad AI - Smart Chat</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #e0eaf5 0%, #f0f4f8 100%);
            --chat-bg: #ffffff;
            --text-color: #0f172a;
            --claude-color: #d97757;
            --gemini-color: #1da1f2;
            --user-msg-bg: #007aff;
            --ai-msg-bg: #f1f5f9;
            --border-color: rgba(0,0,0,0.05);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-gradient: linear-gradient(135deg, #0f172a 0%, #020617 100%);
                --chat-bg: #1e293b;
                --text-color: #f8fafc;
                --ai-msg-bg: #334155;
                --border-color: #334155;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body { background: var(--bg-gradient); height: 100vh; display: flex; justify-content: center; align-items: center; padding: 10px; }
        
        .app-container {
            width: 100%;
            max-width: 480px;
            height: 92vh;
            background: var(--chat-bg);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* الهيدر العلوي */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
        }
        .title-wrap { display: flex; align-items: center; gap: 6px; }
        .title-text { font-size: 1.2rem; font-weight: 700; color: var(--text-color); }
        .title-dot { width: 8px; height: 8px; borderRadius: 50%; background-color: #22c55e; }

        /* شريط اختيار النموذج المتطور */
        .model-switcher {
            display: flex;
            background: var(--ai-msg-bg);
            padding: 4px;
            margin: 10px 16px;
            border-radius: 30px;
            gap: 4px;
        }
        .model-option {
            flex: 1;
            padding: 8px;
            text-align: center;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-color);
            opacity: 0.6;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }
        .model-dot { width: 8px; height: 8px; border-radius: 50%; }
        .model-option.active {
            background: var(--chat-bg);
            opacity: 1;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* مساحة الرسائل */
        .messages-area { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
        
        .msg-row { display: flex; gap: 8px; width: 100%; }
        .msg-row.user { justify-content: flex-start; }
        .msg-row.ai { justify-content: flex-end; }

        .bubble { max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 0.95rem; line-height: 1.4; position: relative; }
        .msg-row.user .bubble { background: var(--user-msg-bg); color: white; border-bottom-right-radius: 4px; }
        .msg-row.ai .bubble { background: var(--ai-msg-bg); color: var(--text-color); border-bottom-left-radius: 4px; }

        /* محاذاة وصناديق الأكواد البرمجية المصلحة */
        .code-block {
            background: #1e1e1e;
            border-radius: 8px;
            margin-top: 8px;
            overflow: hidden;
            color: #d4d4d4;
            direction: ltr;
            text-align: left;
        }
        .code-header {
            background: #2d2d2d;
            padding: 6px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
        }
        .copy-btn {
            background: transparent;
            border: none;
            color: #a6a6a6;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .code-content { padding: 12px; overflow-x: auto; font-family: monospace; font-size: 0.85rem; white-space: pre; }

        /* منطقة الإدخال */
        .input-wrap { padding: 12px 16px; border-top: 1px solid var(--border-color); }
        .input-bar { display: flex; gap: 8px; align-items: center; background: var(--ai-msg-bg); padding: 6px 12px; border-radius: 24px; }
        .input { flex: 1; background: transparent; border: none; outline: none; color: var(--text-color); font-size: 0.95rem; padding: 4px; }
        .send-btn { background: var(--user-msg-bg); color: white; border: none; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 1rem; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <div class="title-wrap">
                <span class="title-text">ahmad AI</span>
                <div class="title-dot"></div>
            </div>
        </div>

        <div class="model-switcher">
            <div class="model-option active" id="opt-claude" onclick="switchModel('claude')">
                <div class="model-dot" style="background: var(--claude-color);"></div>
                <span>Claude</span>
            </div>
            <div class="model-option" id="opt-gemini" onclick="switchModel('gemini')">
                <div class="model-dot" style="background: var(--gemini-color);"></div>
                <span>Gemini</span>
            </div>
        </div>

        <div class="messages-area" id="messagesArea">
            <div class="msg-row ai">
                <div class="bubble">مرحباً بك في ahmad AI! أنا مجهز للعمل بنموذج Claude المطور، اسألني أي شيء أو اطلب كوداً برمجياً.</div>
            </div>
        </div>

        <div class="input-wrap">
            <div class="input-bar">
                <input type="text" class="input" id="chatInput" placeholder="اكتب رسالتك..." onkeypress="handleKey(event)">
                <button class="send-btn" onclick="sendMessage()">➔</button>
            </div>
        </div>
    </div>

    <script>
        let currentModel = "claude";
        const messagesArea = document.getElementById('messagesArea');
        const chatInput = document.getElementById('chatInput');

        function switchModel(model) {
            currentModel = model;
            document.getElementById('opt-claude').classList.remove('active');
            document.getElementById('opt-gemini').classList.remove('active');
            
            if(model === 'claude') {
                document.getElementById('opt-claude').classList.add('active');
                appendSystemMessage("تم التحويل إلى نموذج: claude-3-5-sonnet");
            } else {
                document.getElementById('opt-gemini').classList.add('active');
                appendSystemMessage("تم التحويل إلى نموذج: gemini-1.5-pro");
            }
        }

        function handleKey(e) { if(e.key === 'Enter') sendMessage(); }

        function sendMessage() {
            const text = chatInput.value.trim();
            if(!text) return;

            appendMessage(text, 'user');
            chatInput.value = '';

            // محاكاة الاتصال والرد المنفصل لكل نموذج لمنع التداخل والثغرات
            setTimeout(() => {
                let reply = "";
                if(currentModel === 'claude') {
                    reply = `أنا نموذج Claude المطور من Anthropic. لقد استلمت طلبك بنجاح. إليك نموذج الكود المطلوب:\n\`\`\`python\ndef check_prime(n):\n    if n < 2: return False\n    for i in range(2, int(n**0.5)+1):\n        if n % i == 0: return False\n    return True\n\`\`\``;
                } else {
                    reply = `مرحباً أحمد، أنا محرك Gemini الذكي المطور من Google. بخصوص مسألتك التقنية "${text}"، يمكننا حلها بتحليل البيانات بشكل هيكلي دقيق ومختلف تماماً عن النماذج الأخرى.`;
                }
                appendMessage(reply, 'ai');
            }, 800);
        }

        function appendMessage(text, sender) {
            const row = document.createElement('div');
            row.className = `msg-row ${sender}`;
            
            const bubble = document.createElement('div');
            bubble.className = 'bubble';

            // دالة الفحص المصلحة للأكواد البرمجية داخل النص
            if(text.includes('```')) {
                const parts = text.split(/```/);
                parts.forEach((part, index) => {
                    if(index % 2 === 1) { // جزء الكود البرمجي
                        const lines = part.split('\n');
                        const lang = lines[0] || 'code';
                        const code = lines.slice(1).join('\n');

                        const codeBlock = document.createElement('div');
                        codeBlock.className = 'code-block';
                        codeBlock.innerHTML = `
                            <div class="code-header">
                                <span>${lang}</span>
                                <button class="copy-btn" onclick="navigator.clipboard.writeText(\`${code.replace(/`/g, '\\`').trim()}\`); alert('تم النسخ!');">نسخ</button>
                            </div>
                            <div class="code-content">${code.trim()}</div>
                        `;
                        bubble.appendChild(codeBlock);
                    } else { // جزء النص العادي
                        if(part.trim()) {
                            const txtNode = document.createElement('p');
                            txtNode.innerText = part;
                            bubble.appendChild(txtNode);
                        }
                    }
                });
            } else {
                bubble.innerText = text;
            }

            row.appendChild(bubble);
            messagesArea.appendChild(row);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function appendSystemMessage(text) {
            const sysDiv = document.createElement('div');
            sysDiv.style.cssText = "align-self: center; font-size: 0.75rem; background: rgba(0,0,0,0.04); padding: 4px 12px; border-radius: 12px; margin: 4px 0; opacity: 0.7; color: var(--text-color);";
            sysDiv.innerText = text;
            messagesArea.appendChild(sysDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }
    </script>
</body>
</html>
