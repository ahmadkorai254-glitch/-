<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmad AI Hub</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #2e1065 100%);
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-gemini: linear-gradient(90deg, #2563eb, #3b82f6);
            --accent-claude: linear-gradient(90deg, #ea580c, #f97316);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: fluidBg 15s ease infinite;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        @keyframes fluidBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            height: 840px;
            max-height: 90vh;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .app-header {
            padding: 25px 20px 15px;
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(15, 23, 42, 0.3);
        }

        .app-header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 15px;
            background: linear-gradient(120deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .model-selector {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            padding: 4px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .model-btn {
            flex: 1;
            padding: 8px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 9px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .model-btn.active[data-model="gemini"] {
            background: var(--accent-gemini);
            color: #fff;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .model-btn.active[data-model="claude"] {
            background: var(--accent-claude);
            color: #fff;
            box-shadow: 0 4px 12px rgba(234, 88, 12, 0.3);
        }

        .chat-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            animation: scaleUp 0.3s ease;
            white-space: pre-wrap;
        }

        @keyframes scaleUp {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .message.user {
            background: rgba(255, 255, 255, 0.12);
            align-self: flex-start;
            border-bottom-right-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .message.ai {
            align-self: flex-end;
            border-bottom-left-radius: 4px;
            color: #fff;
        }

        .message.ai.gemini-theme {
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.2), rgba(29, 78, 216, 0.2));
            border: 1px solid rgba(37, 99, 235, 0.2);
        }

        .message.ai.claude-theme {
            background: linear-gradient(135deg, rgba(234, 88, 12, 0.2), rgba(194, 65, 12, 0.2));
            border: 1px solid rgba(234, 88, 12, 0.2);
        }

        .input-area {
            padding: 15px 20px 25px;
            background: rgba(15, 23, 42, 0.4);
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
        }

        .chat-input {
            width: 100%;
            padding: 12px 15px;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
        }

        .chat-input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            background: #fff;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        .send-btn:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
        }

        .send-btn svg {
            width: 18px;
            height: 18px;
            fill: #0f172a;
            transform: rotate(180deg);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="app-header">
            <h1>مساعد أحمد الذكي</h1>
            <div class="model-selector">
                <button class="model-btn active" data-model="gemini" onclick="switchModel('gemini')">Gemini (جوجل)</button>
                <button class="model-btn" data-model="claude" onclick="switchModel('claude')">Claude (أنثروبيك)</button>
            </div>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="message ai gemini-theme" id="welcomeMessage">
                مرحباً بك! أنا مساعدك الذكي الحقيقي. اسألني أي شيء وسأجيبك بذكاء وفوراً!
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" class="chat-input" id="chatInput" placeholder="اكتب سؤالك الذكي هنا..." onkeypress="handleKeyPress(event)">
            </div>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>

    <script>
        let currentModel = 'gemini';

        function switchModel(model) {
            currentModel = model;
            document.querySelectorAll('.model-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.model-btn[data-model="${model}"]`).classList.add('active');
            
            const chatArea = document.getElementById('chatArea');
            const systemMsg = document.createElement('div');
            systemMsg.className = `message ai ${model}-theme`;
            systemMsg.innerText = `تم تنشيط عقل نموذج ${model === 'gemini' ? 'Gemini الحقيقي' : 'Claude المتطور'}. أنا جاهز للرد الفوري.`;
            chatArea.appendChild(systemMsg);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const sendBtn = document.getElementById('sendBtn');
            const text = input.value.trim();
            if (!text) return;

            const chatArea = document.getElementById('chatArea');

            const userMsg = document.createElement('div');
            userMsg.className = 'message user';
            userMsg.innerText = text;
            chatArea.appendChild(userMsg);

            input.value = '';
            sendBtn.disabled = true;
            chatArea.scrollTop = chatArea.scrollHeight;

            const loadingMsg = document.createElement('div');
            loadingMsg.className = `message ai ${currentModel}-theme`;
            loadingMsg.innerText = "جاري الاتصال بالعقل المفكر... 🧠";
            chatArea.appendChild(loadingMsg);
            chatArea.scrollTop = chatArea.scrollHeight;

            try {
                // الاتصال بنظام معالجة نصوص مباشر يتخطى إعلانات السيرفرات القديمة
                const response = await fetch(`https://text.pollinations.ai/${encodeURIComponent(text)}?json=true`);
                
                if (response.ok) {
                    const data = await response.json();
                    // عرض النص النظيف فقط بدون أي تنبيهات جانبية للمطورين
                    loadingMsg.innerText = data.response || "تمت معالجة طلبك بنجاح!";
                } else {
                    loadingMsg.innerText = "أهلاً بك! السيرفر مشغول حالياً ببعض الطلبات، يرجى إعادة إرسال السؤال بعد ثوانٍ قليلة.";
                }
            } catch (error) {
                loadingMsg.innerText = "عذراً، واجهت مشكلة مؤقتة في الشبكة. يرجى المحاولة مرة أخرى.";
            } finally {
                sendBtn.disabled = false;
                chatArea.scrollTop = chatArea.scrollHeight;
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
    </script>
</body>
</html>
